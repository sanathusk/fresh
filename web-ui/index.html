<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fresh — web UI (real render pipeline)</title>
<!--
  Non-terminal UI for Fresh. The REAL editor render pipeline decides what to draw;
  this frontend only re-targets the final drawing:
    - buffer interiors  -> the real syntax-highlighted CELLS the pipeline drew in
                           each pane's content_rect (drawn here as SVG text).
    - chrome            -> NATIVE UI elements built from the *semantic* model the
                           pipeline already computed (menu tree, tabs, status
                           segments). No chrome is drawn from cells.
  The editor stays the single source of truth: every chrome interaction is
  forwarded back through the real Editor::handle_mouse at the cell coordinates
  the pipeline reported, so highlight / selection / open / close all match the
  TUI and GUI exactly.
  Served by the bridge that hosts a real Editor:
    cargo run -p fresh-editor --example webui_server -- 127.0.0.1:8139 <files…>
-->
<style>
  :root{--bg:#1e1e1e;--bg2:#252526;--bg3:#333;--fg:#d4d4d4;--muted:#9aa0a6;
    --accent:#0a84ff;--border:#3a3a3a;--menuhi:#0a64c8;
    --status-bg:#0a84ff;--status-fg:#fff}
  *{box-sizing:border-box}
  :focus{outline:none}
  html,body{height:100%;margin:0}
  body{height:100vh;background:var(--bg);color:var(--fg);overflow:hidden;
    font:13px/1.4 -apple-system,Segoe UI,Roboto,system-ui,sans-serif;-webkit-font-smoothing:antialiased;user-select:none}
  #app{position:relative;width:100vw;height:100vh}
  .region{position:absolute;overflow:hidden}

  /* ---- menu bar (native) ---- */
  .menubar{display:flex;align-items:center;gap:0;background:var(--bg3);
    border-bottom:1px solid var(--border);padding:0 4px}
  .menu{padding:0 10px;height:100%;display:flex;align-items:center;border-radius:0;color:var(--fg);cursor:default}
  .menu:hover{background:#454545}
  .menu.open{background:var(--menuhi);color:#fff}

  /* ---- menu dropdown (native, positioned at the pipeline's item rects) ---- */
  /* decorative backing panel sits BEHIND the rows and never eats clicks */
  .dropdown{position:absolute;z-index:70;pointer-events:none;background:#2b2b2b;
    border-radius:6px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .mitem,.msep,.mlabel{position:absolute;z-index:81}
  .mitem{display:flex;align-items:center;gap:18px;padding:0 14px;white-space:nowrap;cursor:default;color:var(--fg)}
  .mitem.hi{background:var(--menuhi);color:#fff}
  .mitem.disabled{color:#6a6a6a}
  .mitem .lab{flex:1;display:flex;align-items:center;gap:6px}
  .mitem .accel{color:var(--muted);font-size:11px}
  .mitem.hi .accel{color:#dfe8ff}
  .mitem .arrow{color:var(--muted)}
  .mitem .check{width:12px;display:inline-block;text-align:center}
  .msep{height:1px;background:#4a4a4a;margin:4px 8px}
  .mlabel{padding:0 14px;color:var(--muted);font-style:italic}

  /* ---- tabs (native) ---- */
  .tabbar{display:flex;align-items:stretch;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden}
  .tab{display:flex;align-items:center;gap:6px;padding:0 10px;border-right:1px solid var(--border);
    color:var(--muted);background:var(--bg2);max-width:220px;cursor:default}
  .tab.active{color:var(--fg);background:var(--bg)}
  .tab .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tab .dot{width:8px;height:8px;border-radius:50%;background:var(--fg);flex:0 0 auto;visibility:hidden}
  .tab.modified .dot{visibility:visible}
  .tab .x{width:16px;height:16px;border-radius:4px;text-align:center;line-height:15px;color:var(--muted);flex:0 0 auto}
  .tab .x:hover{background:#5a5a5a;color:#fff}

  /* ---- status bar (native) ---- */
  .statusbar{display:flex;align-items:center;background:var(--status-bg);color:var(--status-fg);
    padding:0 10px;font-size:12px;gap:0;white-space:pre}
  .statusbar .txt{padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60vw}
  .statusbar .seg{padding:0 8px;border-radius:3px;cursor:default}
  .statusbar .seg:hover{background:rgba(255,255,255,.18)}

  /* ---- command palette / picker (native) ---- */
  .palette{position:absolute;z-index:90;display:flex;flex-direction:column;
    background:var(--bg2);border:1px solid var(--border);border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,.6);overflow:hidden}
  .palette.with-preview{overflow:hidden}
  .palette .pbody{display:flex;align-items:stretch;min-height:0}
  .palette .pbody .plist{max-height:none;border-right:1px solid var(--border)}
  .palette .ppreview{background:var(--bg);overflow:hidden}
  .palette .ppreview svg.cells{width:100%;height:100%}
  .palette .pinput{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);background:var(--bg)}
  .palette .pinput .q{flex:1;color:var(--fg);white-space:pre;overflow:hidden;text-overflow:ellipsis}
  .palette .pinput .q .caret2{display:inline-block;width:1px;background:#aeafad;animation:blink 1.05s steps(1) infinite}
  .palette .pinput .status{color:var(--muted);font-size:11px}
  .palette .pinput .count{color:var(--muted);font-size:11px}
  .palette .plist{overflow-y:auto;max-height:50vh;padding:4px 0}
  .palette .prow{display:flex;align-items:center;gap:10px;padding:3px 12px;cursor:default;color:var(--fg)}
  .palette .prow.sel{background:var(--menuhi);color:#fff}
  .palette .prow.disabled{color:#6a6a6a}
  .palette .prow .ptext{flex:0 0 auto}
  .palette .prow .pdesc{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .palette .prow.sel .pdesc{color:#dfe8ff}
  .palette .prow .pkey{color:var(--muted);font-size:11px;border:1px solid #555;border-radius:3px;padding:0 5px}
  .palette .prow.sel .pkey{color:#fff;border-color:#9bbcf0}
  .palette .ptitle{padding:6px 12px;color:var(--muted);font-size:11px;border-bottom:1px solid #3a3a3a}
  .fileexplorer{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;font-size:12px}
  .fileexplorer .fx-title{padding:2px 8px;color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 0 auto}
  .fileexplorer .fx-list{overflow:auto;flex:1}
  .fileexplorer .fx-row{display:flex;align-items:center;gap:4px;padding:0 6px;white-space:nowrap;cursor:default;color:var(--fg);line-height:1.5}
  .fileexplorer .fx-row.sel{background:var(--menuhi);color:#fff}
  .fileexplorer .fx-row .fx-chev{width:10px;flex:0 0 auto;color:var(--muted);text-align:center}
  .fileexplorer .fx-row.sel .fx-chev{color:#fff}
  .fileexplorer .fx-row .fx-name{overflow:hidden;text-overflow:ellipsis}
  .fileexplorer .fx-row .fx-name.dir{font-weight:600}
  .pane-content{background:var(--bg)}
  /* Gutter (line numbers + separator) is its own element, kept out of the
     buffer-text flow and non-selectable, so a future native text selection of
     the buffer won't pick up line numbers. */
  .pane-gutter{background:var(--bg);user-select:none;-webkit-user-select:none}
  .separator{background:var(--border)}
  .separator:hover{background:var(--accent)}
  .resize-grip{position:absolute;z-index:97;cursor:col-resize}
  .resize-grip:hover{background:var(--accent);opacity:.5}
  .scrollbar{background:transparent}
  .thumb{position:absolute;right:1px;width:8px;border-radius:4px;background:#5a5a5a}
  .thumb:hover{background:#7a7a7a}
  .caret{position:absolute;background:#aeafad;width:2px;z-index:40;animation:blink 1.05s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  /* ---- workspace-trust dialog (native modal) ---- */
  .modal-scrim{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:95}
  .trustdialog{position:absolute;z-index:96;background:#2b2b2b;border:1px solid #5a5a5a;
    border-radius:8px;box-shadow:0 20px 70px rgba(0,0,0,.6);overflow:auto;display:flex;flex-direction:column;padding:10px 14px;font-size:13px;min-width:420px}
  .trustdialog .td-title{color:#e5c07b;font-weight:700;margin-bottom:6px}
  .trustdialog .td-path{color:var(--fg);font-family:ui-monospace,monospace;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .trustdialog .td-triggers{color:var(--muted);font-size:11px;margin:2px 0 8px}
  .trustdialog .td-opt{display:flex;gap:8px;align-items:flex-start;padding:5px 8px;border-radius:5px;cursor:default}
  .trustdialog .td-opt.sel{background:var(--menuhi);color:#fff}
  .trustdialog .td-opt .td-radio{flex:0 0 auto}
  .trustdialog .td-opt .td-otext .td-olabel{font-weight:600}
  .trustdialog .td-opt .td-otext .td-odesc{color:var(--muted);font-size:11px}
  .trustdialog .td-opt.sel .td-odesc{color:#dfe8ff}
  .trustdialog .td-buttons{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}
  .trustdialog .td-btn{padding:3px 14px;border:1px solid #5a5a5a;border-radius:5px;cursor:default;color:var(--fg)}
  .trustdialog .td-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}

  /* ---- plugin widgets (WidgetSpec) ---- */
  .ptoolbar{padding:4px 8px;border-bottom:1px solid var(--border)}
  .w-row{display:flex;flex-direction:row;align-items:center;gap:8px;flex-wrap:nowrap}
  .w-row.wrap{flex-wrap:wrap}
  .w-col{display:flex;flex-direction:column;gap:4px}
  .w-toggle{display:inline-flex;align-items:center;gap:4px;cursor:default;padding:1px 4px;border-radius:4px}
  .w-toggle.on{color:var(--accent)}
  .w-toggle.focus,.w-button.focus{outline:1px solid var(--accent)}
  .w-toggle .w-box{font-size:13px}
  .w-button{cursor:default;padding:1px 10px;border:1px solid #5a5a5a;border-radius:4px;color:var(--fg)}
  .w-button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .w-button.danger{border-color:#c0392b;color:#e57373}
  .w-button.disabled{opacity:.5}
  .w-divider{border-top:1px solid var(--border);margin:4px 0;align-self:stretch}
  .w-hintbar{display:flex;gap:12px;color:var(--muted);font-size:11px}
  .w-hint b{color:var(--accent);font-weight:600}
  .w-section{border:1px solid var(--border);border-radius:6px;padding:6px}
  .w-section-label{color:var(--muted);font-size:11px;margin-bottom:4px}
  .w-raw{white-space:pre;font-family:ui-monospace,monospace}
  .w-unsupported{color:var(--muted);font-style:italic;font-size:11px}
  .w-text{display:flex;align-items:center;gap:4px;border:1px solid var(--border);border-radius:4px;padding:1px 6px;background:var(--bg)}
  .w-text.focus{outline:1px solid var(--accent)}
  .w-text-label{color:var(--muted)}
  .w-list{display:flex;flex-direction:column;overflow:auto}
  .w-list-row{padding:1px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default;border-radius:3px}
  .w-list-row.sel{background:var(--menuhi);color:#fff}
  .w-list-empty{color:var(--muted);font-style:italic;padding:2px 6px}
  .w-list-cards{gap:4px;padding:2px}
  .w-list-card{border:1px solid var(--border);border-radius:6px;padding:3px 6px;cursor:default;background:rgba(255,255,255,.02)}
  .w-list-card.sel{border-color:var(--accent);background:var(--menuhi)}
  .w-list-card .w-section{border:none;padding:0}
  /* native Settings (full modal) */
  .settings-modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:96;width:min(960px,90vw);height:min(640px,86vh);
    background:#2b2b2b;border:1px solid #5a5a5a;border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;font-size:12px}
  .settings-modal .set-title{padding:5px 12px;font-weight:600;background:var(--bg3);border-bottom:1px solid var(--border)}
  .settings-modal .set-body{flex:1;display:flex;overflow:hidden}
  .settings-modal .set-cats{width:210px;flex:0 0 auto;overflow:auto;border-right:1px solid var(--border);padding:4px 0}
  .settings-modal .set-cats.focus,.settings-modal .set-items.focus{box-shadow:inset 0 0 0 1px var(--accent)}
  .settings-modal .set-cat{padding:2px 10px;white-space:nowrap;cursor:default} .settings-modal .set-cat.sel{background:var(--menuhi);color:#fff}
  .settings-modal .set-cat-sec{padding:1px 10px;color:var(--muted);font-size:11px}
  .settings-modal .set-items{flex:1;overflow:auto;padding:4px 0}
  .settings-modal .set-section{padding:6px 14px 2px;color:var(--accent);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  .settings-modal .set-item{padding:4px 14px;border-bottom:1px solid rgba(255,255,255,.04)} .settings-modal .set-item.sel{background:var(--menuhi)}
  .settings-modal .set-item.ro{opacity:.6}
  .settings-modal .set-item-head{display:flex;align-items:center;gap:12px}
  .settings-modal .set-name{flex:1;min-width:0} .settings-modal .set-desc{color:var(--muted);font-size:11px;white-space:normal;margin-top:1px}
  .settings-modal .set-ctl-wrap{flex:0 0 auto;max-width:50%;text-align:right;display:flex;justify-content:flex-end;align-items:center}
  .settings-modal .set-ctl{display:inline-flex;align-items:center;gap:4px}
  .settings-modal .set-ctl.set-dim{color:var(--muted);font-style:italic}
  /* toggle switch */
  .settings-modal .set-switch{width:26px;height:14px;border-radius:8px;background:#555;position:relative;display:inline-block;transition:background .1s}
  .settings-modal .set-switch::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#ccc;transition:left .1s}
  .settings-modal .set-switch.on{background:var(--accent)} .settings-modal .set-switch.on::after{left:14px;background:#fff}
  /* number stepper */
  .settings-modal .set-step{display:inline-block;width:18px;text-align:center;border:1px solid #5a5a5a;border-radius:3px;cursor:default}
  .settings-modal .set-num-v{min-width:34px;text-align:center;font-family:ui-monospace,monospace}
  /* dropdown pill + text field */
  .settings-modal .set-pill{padding:1px 8px;border:1px solid #5a5a5a;border-radius:4px;background:var(--bg)}
  .settings-modal .set-field{padding:1px 8px;border:1px solid #5a5a5a;border-radius:4px;background:var(--bg);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,monospace}
  .settings-modal .set-field.mono{font-size:11px}
  .settings-modal .set-dd{position:absolute;background:var(--bg2);border:1px solid #5a5a5a;border-radius:4px;max-height:200px;overflow:auto;margin-top:2px;z-index:3}
  .settings-modal .set-dd-row{padding:1px 10px} .settings-modal .set-dd-row.sel{background:var(--accent);color:#fff}
  /* composite list controls */
  .settings-modal .set-item-block .set-list{margin:4px 0 2px 8px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .settings-modal .set-list-row{display:flex;align-items:center;gap:8px;padding:2px 10px;border-bottom:1px solid rgba(255,255,255,.05)}
  .settings-modal .set-list-row:last-child{border-bottom:none}
  .settings-modal .set-list-badge{color:var(--accent)}
  .settings-modal .set-list-label{font-family:ui-monospace,monospace}
  .settings-modal .set-list-sub{color:var(--muted);margin-left:auto;max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .settings-modal .set-list-empty{padding:3px 10px;color:var(--muted);font-style:italic}
  .settings-modal .set-list-add{padding:2px 10px;color:var(--accent);cursor:default;border-top:1px solid rgba(255,255,255,.06)}
  .settings-modal .set-dual{display:flex;align-items:stretch;gap:6px;margin:4px 0 2px 8px}
  .settings-modal .set-dual-col{flex:1;border:1px solid var(--border);border-radius:6px;overflow:hidden;min-width:0}
  .settings-modal .set-dual-col.active{border-color:var(--accent)}
  .settings-modal .set-dual-coltitle{padding:2px 8px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid rgba(255,255,255,.06)}
  .settings-modal .set-dual-list{max-height:160px;overflow:auto}
  .settings-modal .set-dual-row{padding:2px 8px;font-family:ui-monospace,monospace;cursor:default;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .settings-modal .set-dual-row:hover{background:rgba(255,255,255,.05)}
  .settings-modal .set-dual-row.sel{background:var(--menuhi);color:#fff}
  .settings-modal .set-dual-mid{display:flex;flex-direction:column;justify-content:center;gap:4px}
  .settings-modal .set-dual-btn{padding:1px 7px;border:1px solid #6a6a6a;border-radius:5px;background:var(--bg2);color:var(--fg);cursor:default;text-align:center}
  .settings-modal .set-dual-btn:hover{border-color:var(--accent)}
  .settings-modal .set-search{padding:4px 14px;color:var(--accent)}
  .settings-modal .set-sresult{padding:2px 14px} .settings-modal .set-sresult.sel{background:var(--menuhi);color:#fff}
  .settings-modal .set-footer{display:flex;gap:8px;justify-content:flex-end;align-items:center;padding:6px 12px;border-top:1px solid var(--border);background:var(--bg3)}
  .settings-modal .set-dlg-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
  .settings-modal .btn{padding:3px 14px;border:1px solid #6a6a6a;border-radius:5px;background:var(--bg2);color:var(--fg);cursor:default;line-height:1.4}
  .settings-modal .btn:hover{border-color:#888}
  .settings-modal .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .settings-modal .btn.danger{border-color:#c0392b;color:#e57373}
  .settings-modal .btn.sel{outline:2px solid var(--accent);outline-offset:1px}
  .settings-modal .set-overlay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#333;border:1px solid #6a6a6a;border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,.6);padding:10px 14px;min-width:460px;max-height:70%;overflow:auto;z-index:2}
  .settings-modal .set-entry-title{font-weight:600;margin-bottom:8px}
  /* native keybinding editor (full modal) */
  .kbedit{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:96;width:min(900px,88vw);max-height:84vh;
    background:#2b2b2b;border:1px solid #5a5a5a;border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;font-size:12px}
  .kbedit .kb-title{padding:5px 12px;font-weight:600;background:var(--bg3);border-bottom:1px solid var(--border)}
  .kbedit .kb-header{padding:4px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
  .kbedit .kb-cfg{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kbedit .kb-search{font-family:ui-monospace,monospace}
  .kbedit .kb-search.focus{outline:1px solid var(--accent);border-radius:3px;padding:0 4px}
  .kbedit .kb-search b{color:var(--accent);margin-right:4px}
  .kbedit .kb-filters{display:flex;gap:12px;align-items:center;font-size:11px}
  .kbedit .kb-chip{color:var(--muted)} .kbedit .kb-chip.on{color:#fff;font-weight:600}
  .kbedit .kb-count{margin-left:auto;color:var(--muted)}
  .kbedit .kb-table{overflow:auto;flex:1;font-family:ui-monospace,monospace}
  .kbedit .kb-row{display:flex;padding:0 12px;white-space:nowrap;line-height:1.5}
  .kbedit .kb-row.kb-head{color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0;background:#2b2b2b}
  .kbedit .kb-row.sel{background:var(--menuhi);color:#fff}
  .kbedit .kb-row.kb-section{font-weight:600;color:var(--accent)}
  .kbedit .kb-col{overflow:hidden;text-overflow:ellipsis}
  .kbedit .kb-key{width:16ch;flex:0 0 auto} .kbedit .kb-action{width:26ch;flex:0 0 auto}
  .kbedit .kb-description{flex:1;min-width:0} .kbedit .kb-context{width:16ch;flex:0 0 auto} .kbedit .kb-source{width:8ch;flex:0 0 auto;color:var(--muted)}
  .kbedit .kb-footer{padding:4px 12px;border-top:1px solid var(--border);color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kbedit .kb-overlay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#333;border:1px solid #6a6a6a;border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,.6);padding:10px 14px;min-width:420px;z-index:2}
  .kbedit .kb-dlg-title,.kbedit .kb-confirm-msg{font-weight:600;margin-bottom:8px}
  .kbedit .kb-field{display:flex;align-items:center;gap:8px;padding:3px 6px;border-radius:4px}
  .kbedit .kb-field.focus{background:var(--menuhi);color:#fff}
  .kbedit .kb-field-l{width:80px;color:var(--muted)} .kbedit .kb-field.focus .kb-field-l{color:#dfe8ff}
  .kbedit .kb-field-v{font-family:ui-monospace,monospace} .kbedit .kb-field-x{margin-left:auto;color:var(--muted);font-size:11px}
  .kbedit .kb-err{color:#e57373;margin-left:8px}
  .kbedit .kb-autocomplete{margin:2px 0 2px 88px;border:1px solid var(--border);border-radius:4px;max-height:140px;overflow:auto}
  .kbedit .kb-ac-row{padding:1px 8px;font-family:ui-monospace,monospace} .kbedit .kb-ac-row.sel{background:var(--accent);color:#fff}
  .kbedit .kb-conflicts{margin:6px 0;color:#e5c07b;font-size:11px}
  .kbedit .kb-dlg-btns{display:flex;gap:12px;justify-content:flex-end;margin-top:10px}
  .kbedit .kb-btn{padding:2px 12px;border:1px solid #5a5a5a;border-radius:5px} .kbedit .kb-btn.focus{background:var(--accent);border-color:var(--accent);color:#fff}
  /* native auxiliary modals (keybindings / event-debug / theme-info) */
  .auxmodal{z-index:96;background:#2b2b2b;border:1px solid #5a5a5a;border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;font-size:12px;max-height:80vh}
  .auxmodal.centered{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);min-width:520px;max-width:80vw}
  .auxmodal.anchored{position:absolute;min-width:240px}
  .auxmodal .am-title{padding:5px 12px;font-weight:600;border-bottom:1px solid var(--border);background:var(--bg3)}
  .auxmodal .am-body{overflow:auto;padding:4px 0}
  .auxmodal .am-line{padding:1px 12px;white-space:pre;font-family:ui-monospace,monospace;color:var(--fg)}
  .auxmodal .am-line.sel{background:var(--menuhi);color:#fff}
  .auxmodal .am-footer{padding:4px 12px;border-top:1px solid var(--border);color:var(--muted);font-size:11px}
  /* native right-click / new-tab context menu */
  .ctxmenu{position:absolute;z-index:60;background:var(--bg2);border:1px solid #5a5a5a;border-radius:5px;box-shadow:0 8px 30px rgba(0,0,0,.5);padding:3px 0;font-size:12px;min-width:160px}
  .ctxmenu .ctxitem{padding:2px 14px;white-space:nowrap;cursor:default;color:var(--fg)}
  .ctxmenu .ctxitem.sel{background:var(--menuhi);color:#fff}
  /* floating / dock widget panel surfaces (native plugin UI) */
  .widget-surface{background:var(--bg2);overflow:auto;z-index:40;font-size:12px;padding:4px 6px}
  .widget-surface.w-dock{border-right:1px solid var(--border)}
  .widget-surface.w-floatingModal{border:1px solid #5a5a5a;border-radius:8px;box-shadow:0 16px 60px rgba(0,0,0,.55);z-index:96}
  .widget-surface .w-col{gap:3px}

  /* ---- popups (completion / hover / action / list / text) — native ---- */
  .popup{position:absolute;z-index:75;background:#252526;border:1px solid #454545;
    border-radius:6px;box-shadow:0 12px 40px rgba(0,0,0,.5);overflow:hidden;font-size:12px;display:flex;flex-direction:column}
  .popup .popup-title{padding:3px 10px;color:var(--fg);background:#2d2d30;border-bottom:1px solid #3a3a3a;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .popup .popup-desc{padding:2px 10px;color:var(--muted);border-bottom:1px solid #3a3a3a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .popup .popup-body{overflow:auto;max-height:60vh}
  .popup .popup-row{display:flex;align-items:center;gap:8px;padding:1px 10px;white-space:nowrap;color:var(--fg);cursor:default}
  .popup .popup-row.sel{background:var(--menuhi);color:#fff}
  .popup .popup-row.disabled{color:#6a6a6a}
  .popup .popup-row .ptext2{flex:0 0 auto}
  .popup .popup-row .pdetail{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis}
  .popup .popup-row.sel .pdetail{color:#dfe8ff}
  .popup .popup-row .picon{width:14px;text-align:center;flex:0 0 auto}
  .popup .popup-line{padding:0 10px;white-space:pre;color:var(--fg)}
  svg.cells{display:block;width:100%;height:100%;
    font-family:ui-monospace,SFMono-Regular,JetBrains Mono,Menlo,Consolas,monospace}
  #err{position:fixed;left:0;bottom:0;right:0;background:#5a1d1d;color:#fff;padding:6px 12px;display:none;z-index:99}
</style>
</head>
<body>
<div id="app"></div>
<div id="err"></div>

<script>
"use strict";
// --------------------------------------------------------------------------
// Real-render client. NO local model and NO re-implemented layout: the server
// runs the real Editor::render and reports the cell grid for buffer interiors
// plus the *semantic* chrome model (menu tree, tabs, status segments) the
// pipeline already computed. Buffer interiors are drawn as cells; chrome is
// drawn as native HTML. Every chrome interaction is sent back to the real
// Editor::handle_mouse at the cell coords the pipeline reported.
// --------------------------------------------------------------------------
let scene = null;
const CW = 8.2, CH = 18;        // cell pixel size (terminal cells -> pixels)

const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const px = (cells, sz) => (cells*sz);
function place(el, r){ el.style.left=px(r.x,CW)+"px"; el.style.top=px(r.y,CH)+"px"; el.style.width=px(r.w,CW)+"px"; el.style.height=px(r.h,CH)+"px"; }
function div(cls){ const d=document.createElement("div"); d.className=cls; return d; }
// cell coordinate to forward to the editor for a click on a chrome rect
const rectCell = r => ({ col: r.x + Math.floor(r.w/2), row: r.y });

// Vertical box-drawing glyphs the editor uses for the line-number gutter,
// tree guides and rules. Rendered as crisp full-height vector lines instead of
// the font glyph — stacked glyphs leave gaps at our cell height, so the gutter
// looked dashed; a rule per cell is contiguous row-to-row, i.e. one clean line.
const VRULE = "│┃";
// Draw a block of cells (rows of styled runs) as SVG <text>/<tspan>.
function cellsSvg(cells, wCells){
  let s=`<svg class="cells" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${px(wCells,CW)} ${px(cells.length,CH)}" preserveAspectRatio="xMinYMin slice" font-size="13">`;
  let rules="";   // vector vertical rules, drawn above the text layer
  for(let row=0; row<cells.length; row++){
    const y=(row+1)*CH - 5;
    let col=0;
    for(const r of cells[row]){
      const ebg=r.r?(r.fg||"#d4d4d4"):r.bg;
      if(ebg){ s+=`<rect x="${(px(col,CW)).toFixed(1)}" y="${(row*CH).toFixed(1)}" width="${(px(r.t.length,CW)).toFixed(1)}" height="${CH}" fill="${ebg}"/>`; }
      col+=r.t.length;
    }
    s+=`<text y="${y.toFixed(1)}" xml:space="preserve">`;
    col=0;
    for(const r of cells[row]){
      const fill=r.r?(r.bg||"#1e1e1e"):(r.fg||"#d4d4d4");
      const weight=r.b?` font-weight="bold"`:"";
      const style=r.i?` font-style="italic"`:"";
      const deco=r.u?` text-decoration="underline"`:"";
      // Substitute vertical box-drawing chars with a vector rule: collect a
      // full-height line per cell, and blank the glyph in the text so only the
      // rule shows (no dashed glyph behind it).
      let shown=r.t;
      if([...r.t].some(ch=>VRULE.includes(ch))){
        for(let i=0;i<r.t.length;i++){ if(VRULE.includes(r.t[i])){
          const cx=px(col+i,CW)+CW/2;
          const hv=r.t[i]==="┃"?1.8:1.1;
          rules+=`<rect x="${(cx-hv/2).toFixed(2)}" y="${(row*CH).toFixed(1)}" width="${hv}" height="${CH}" fill="${fill}"/>`;
        }}
        shown=[...r.t].map(ch=>VRULE.includes(ch)?" ":ch).join("");
      }
      // Pin EVERY glyph to its exact cell column via a per-character x list.
      // The font's glyph advance isn't exactly CW, so relying on natural advance
      // (or even textLength stretching, which distributes spacing differently
      // for a short highlighted run than for the long run it was part of) lets
      // glyphs drift when run boundaries change — e.g. toggling occurrence /
      // current-line highlights re-split runs and visibly nudged the text. A
      // hard x per cell makes column position independent of run grouping.
      let xs="";
      for(let i=0;i<shown.length;i++){ xs+=(i?" ":"")+px(col+i,CW).toFixed(1); }
      s+=`<tspan x="${xs}" fill="${fill}"${weight}${style}${deco}>${esc(shown)}</tspan>`;
      col+=r.t.length;
    }
    s+=`</text>`;
  }
  s+=rules;
  s+=`</svg>`;
  return s;
}

// Seed the chrome CSS variables from the editor's active theme so the native
// HTML matches the terminal palette (instead of a fixed dark scheme). Each var
// falls back to its :root default when the theme leaves a color at terminal
// "reset" (null).
function applyTheme(t){
  if(!t) return;
  const r=document.documentElement.style;
  const set=(k,v)=>{ if(v) r.setProperty(k,v); else r.removeProperty(k); };
  set("--bg",t.bg); set("--fg",t.fg); set("--accent",t.accent);
  set("--muted",t.muted); set("--bg2",t.popupBg); set("--bg3",t.menuBg);
  set("--menuhi",t.menuHi); set("--border",t.border);
  set("--status-bg",t.statusBg); set("--status-fg",t.statusFg);
}

// Selectors for natively-scrolled chrome whose scrollTop must survive a full
// DOM rebuild (otherwise any re-render would snap them back to the top).
const SCROLL_KEEP = ".set-items,.set-cats,.w-list,.widget-surface";
function render(){
  const app=document.getElementById("app");
  if(!scene){ app.textContent="connecting to editor…"; return; }
  applyTheme(scene.theme);
  // Snapshot scroll positions before the rebuild, keyed by document-order
  // ordinal (stable across a same-structure re-render).
  const savedScroll=[];
  document.querySelectorAll(SCROLL_KEEP).forEach((e,i)=>{ savedScroll[i]=e.scrollTop; });
  app.innerHTML="";
  const reg=scene.regions;

  // file explorer (UI pane; content = its real cells)
  if(reg.fileExplorer) app.appendChild(fileExplorerEl(reg.fileExplorer));

  // panes: native tab bar + buffer interior (real cells) + scrollbar (UI).
  // The line-number gutter is rendered as its own element, separate from the
  // buffer-text flow, so a future native text selection covers only the code
  // (not the gutter/line-number column). Both are still real pipeline cells.
  for(const p of reg.panes){
    if(p.tabBar) app.appendChild(tabBarEl(p));
    const gw=p.gutterWidth||0;
    if(gw>0 && p.gutter){
      // Gutter (line numbers + separator) and buffer text are emitted as
      // separate cell blocks by the bridge — render them as separate elements.
      const g=div("region pane-gutter"); place(g,{x:p.content.x,y:p.content.y,w:gw,h:p.content.h});
      g.innerHTML=cellsSvg(p.gutter, gw); app.appendChild(g);
      const c=div("region pane-content"); place(c,{x:p.content.x+gw,y:p.content.y,w:p.content.w-gw,h:p.content.h});
      c.innerHTML=cellsSvg(p.cells, p.content.w-gw); app.appendChild(c);
    } else {
      const c=div("region pane-content"); place(c,p.content); c.innerHTML=cellsSvg(p.cells, p.content.w); app.appendChild(c);
    }
    if(p.vscroll && p.vscroll.w>0){
      const sb=div("region scrollbar"); place(sb,p.vscroll); app.appendChild(sb);
      const th=document.createElement("div"); th.className="thumb";
      th.style.top=px(p.thumbStart,CH)+"px"; th.style.height=Math.max(CH, px(Math.max(1,p.thumbEnd-p.thumbStart),CH))+"px";
      sb.appendChild(th);
    }
  }

  // split borders
  for(const s of reg.separators){
    const d=div("region separator");
    if(s.vertical) place(d,{x:s.x,y:s.y,w:1,h:s.len}); else place(d,{x:s.x,y:s.y,w:s.len,h:1});
    app.appendChild(d);
  }

  // native menu bar + dropdown
  if(reg.menubar) app.appendChild(menuBarEl(reg));
  for(const d of menuDropdownEls(reg)) app.appendChild(d);

  // native status bar
  if(reg.statusbar) app.appendChild(statusBarEl(reg.statusbar));

  // native popups (completion / hover / action / list / text) — semantic, not cells
  for(const p of (reg.popups||[])) app.appendChild(popupEl(p));

  // native command palette / picker (semantic; routes back to the real editor).
  // The live-grep / quick-open preview pane is rendered inside the card by
  // paletteEl (a results|preview body), matching the TUI's single box.
  if(reg.palette) app.appendChild(paletteEl(reg.palette));

  // native plugin widget panels (floating / dock)
  if(reg.widgets) for(const s of reg.widgets) app.appendChild(widgetSurfaceEl(s));

  // native right-click / new-tab context menu
  if(reg.contextMenu) app.appendChild(contextMenuEl(reg.contextMenu));

  // native auxiliary modals (event-debug / theme-info)
  if(reg.auxModal) for(const el of auxModalEls(reg.auxModal)) app.appendChild(el);

  // native keybinding editor (full modal)
  if(reg.keybindingEditor) for(const el of keybindingEditorEls(reg.keybindingEditor)) app.appendChild(el);

  // native Settings (full modal)
  if(reg.settings) for(const el of settingsEls(reg.settings)) app.appendChild(el);

  // native workspace-trust modal
  if(reg.trustDialog) for(const el of trustDialogEls(reg.trustDialog)) app.appendChild(el);

  // live caret from the pipeline's real cursor cell (if inside a pane)
  if(reg.cursor){
    const inPane=reg.panes.some(p=>reg.cursor.x>=p.content.x && reg.cursor.x<p.content.x+p.content.w && reg.cursor.y>=p.content.y && reg.cursor.y<p.content.y+p.content.h);
    if(inPane){ const c=div("caret"); c.style.left=px(reg.cursor.x,CW)+"px"; c.style.top=px(reg.cursor.y,CH)+"px"; c.style.height=CH+"px"; app.appendChild(c); }
  }
  // Restore the scroll positions snapshotted above.
  document.querySelectorAll(SCROLL_KEEP).forEach((e,i)=>{ if(savedScroll[i]) e.scrollTop=savedScroll[i]; });
}

// ---- native menu bar ----------------------------------------------------
function menuBarEl(reg){
  const rect=reg.menubar;            // menubar region IS the rect {x,y,w,h}
  const bar=div("region menubar"); place(bar,{x:rect.x,y:rect.y,w:rect.w,h:1});
  const barRow=rect.y;
  reg.menus.forEach((m,i)=>{
    const el=div("menu"+(reg.menuOpen===i?" open":""));
    el.textContent=m.label;
    // Position each title at its EDITOR cell x (not CSS flow), so the title sits
    // exactly where the editor hit-tests it and the dropdown — positioned at the
    // same cell coords — opens directly beneath it.
    if(m.x!=null){ el.style.position="absolute";
      el.style.left=px(m.x-rect.x,CW)+"px";
      if(m.w) el.style.width=px(m.w,CW)+"px";
      el.style.padding="0"; el.style.justifyContent="center"; }
    // forward to the real editor at the menu label's center cell -> it opens/toggles.
    const col=(m.x??rect.x)+Math.floor((m.w||1)/2);
    el.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col,row:barRow}); };
    // Hover switches menus only while one is open (mirrors the TUI). Uses the
    // menu's editor cell, and `mousemove` so a stationary cursor never fights
    // keyboard navigation.
    el.onmousemove=()=>{ if(reg.menuOpen!=null) hoverMove(col,barRow,"menu:"+i); };
    bar.appendChild(el);
  });
  return bar;
}

// Walk submenuPath to the items list shown at a given submenu depth (>=1).
function submenuItems(reg, depth){
  let items=reg.menus[reg.menuOpen]?.items||[];
  for(let d=0; d<depth; d++){
    const it=items[reg.submenuPath[d]];
    if(!it||it.kind!=="submenu") return [];
    items=it.items||[];
  }
  return items;
}

// One native dropdown row, positioned at the pipeline's cell rect.
// `hi` says whether the editor currently highlights this row.
function itemRow(item, rect, hi){
  if(!item) return null;
  if(item.kind==="sep"){ const s=div("msep"); place(s,rect); s.style.height="1px"; s.style.top=px(rect.y+0.5,CH)+"px"; return s; }
  if(item.kind==="label"){ const l=div("mlabel"); place(l,rect); l.style.lineHeight=CH+"px"; l.textContent=item.label; return l; }
  const cell=rectCell(rect);
  const row=div("mitem"+(hi?" hi":"")+(item.enabled===false?" disabled":""));
  place(row,rect); row.style.lineHeight=CH+"px";
  const check = item.checked===true?"✓":"";
  const arrow = item.kind==="submenu"?'<span class="arrow">›</span>':"";
  const accel = item.accel?`<span class="accel">${esc(item.accel)}</span>`:"";
  row.innerHTML=`<span class="lab"><span class="check">${check}</span>${esc(item.label)}</span>${accel}${arrow}`;
  // hover highlights via `mousemove` (never fires on a DOM rebuild under a
  // stationary cursor), so arrow-key navigation isn't reset by the mouse.
  row.onmousemove=()=>hoverMove(cell.col,cell.row,"item:"+cell.col+","+cell.row);
  row.onmousedown=e=>{ e.preventDefault(); e.stopPropagation();
    if(item.enabled===false) return;
    sendMouse({kind:"down",button:"left",col:cell.col,row:cell.row}); };
  return row;
}

function menuDropdownEls(reg){
  const out=[];
  if(reg.menuOpen==null || !reg.dropdown) return out;
  for(const grp of dropdownPanels(reg)) out.push(grp);      // solid backing panels
  const path=reg.submenuPath||[];
  // top-level items: highlighted = menuHighlight when no submenu is deeper,
  // otherwise the parent of the open submenu (path[0]).
  const items=reg.menus[reg.menuOpen]?.items||[];
  for(const di of reg.dropdown.items){
    const hi = path.length===0 ? di.index===reg.menuHighlight : di.index===path[0];
    const el=itemRow(items[di.index], di.rect, hi); if(el) out.push(el);
  }
  // expanded submenu levels
  for(const su of (reg.dropdown.submenus||[])){
    const list=submenuItems(reg, su.depth);
    const deepest = su.depth===path.length;
    const hi = deepest ? su.index===reg.menuHighlight : su.index===path[su.depth];
    const el=itemRow(list[su.index], su.rect, hi); if(el) out.push(el);
  }
  return out;
}

// Solid rounded panels behind the top-level dropdown and each submenu level,
// sized from the union of that level's item rects. (The pipeline no longer draws
// the menu into the cells behind us — suppress_chrome_cells — so the panel needs
// only back the items, with no cover-up margin.)
function dropdownPanels(reg){
  const panels=[];
  const box=(rects)=>{
    if(!rects.length) return null;
    const x0=Math.min(...rects.map(r=>r.x)), y0=Math.min(...rects.map(r=>r.y));
    const x1=Math.max(...rects.map(r=>r.x+r.w)), y1=Math.max(...rects.map(r=>r.y+r.h));
    const p=div("dropdown"); place(p,{x:x0,y:y0,w:x1-x0,h:y1-y0}); return p;
  };
  const top=box(reg.dropdown.items.map(i=>i.rect)); if(top) panels.push(top);
  const byDepth={};
  for(const su of (reg.dropdown.submenus||[])) (byDepth[su.depth]=byDepth[su.depth]||[]).push(su.rect);
  for(const d of Object.keys(byDepth)){ const p=box(byDepth[d]); if(p) panels.push(p); }
  return panels;
}

// ---- native tab bar -----------------------------------------------------
function tabBarEl(p){
  const bar=div("region tabbar"); place(bar,p.tabBar);
  for(const t of p.tabs){
    const el=div("tab"+(t.active?" active":"")+(t.modified?" modified":""));
    if(t.rect){ const c=rectCell(t.rect);
      el.onmousedown=e=>{ if(e.target.classList.contains("x")) return; e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:btn(e),col:c.col,row:c.row}); }; }
    const name=document.createElement("span"); name.className="name"; name.textContent=t.label; el.appendChild(name);
    const dot=document.createElement("span"); dot.className="dot"; el.appendChild(dot);
    const x=document.createElement("span"); x.className="x"; x.textContent="×";
    if(t.closeRect){ const cc=rectCell(t.closeRect);
      x.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:cc.col,row:cc.row}); }; }
    el.appendChild(x);
    bar.appendChild(el);
  }
  return bar;
}

// ---- native command palette / picker ------------------------------------
// The editor owns the query, the filtered suggestions, the selection and the
// scroll window; we render them natively and forward row clicks / wheel back
// through handle_mouse at the pipeline's list cell rect so it stays in sync.
// Build the scrollable results list (rows map 1:1 to the editor's visible
// suggestion window; clicks/wheel route back through handle_mouse at the list
// cell rect so the editor stays the source of truth).
function paletteListEl(p, list){
  const listBox=div("plist");
  const start=p.scrollStart||0, n=p.visibleCount||p.suggestions.length;
  for(let j=0;j<n;j++){
    const idx=start+j; const s=p.suggestions[idx]; if(!s) break;
    const row=div("prow"+(idx===p.selected?" sel":"")+(s.disabled?" disabled":""));
    const tx=document.createElement("span"); tx.className="ptext"; tx.textContent=s.text; row.appendChild(tx);
    const ds=document.createElement("span"); ds.className="pdesc"; ds.textContent=s.description||""; row.appendChild(ds);
    if(s.keybinding){ const k=document.createElement("span"); k.className="pkey"; k.textContent=s.keybinding; row.appendChild(k); }
    if(list){ const cell={col:list.x+1,row:list.y+j};
      row.onmousedown=e=>{ if(s.disabled) return; e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:cell.col,row:cell.row}); }; }
    listBox.appendChild(row);
  }
  if(list){ listBox.addEventListener("wheel",e=>{ e.stopPropagation();
    sendMouse({kind:e.deltaY>0?"scrolldown":"scrollup",col:list.x+1,row:list.y,n:Math.min(5,Math.max(1,Math.round(Math.abs(e.deltaY)/40)))}); },{passive:true}); }
  return listBox;
}

function paletteEl(p){
  const list = p.listRect || p.outerRect;
  // When the overlay has a preview pane, the card spans BOTH columns and lays
  // out exactly like the TUI's single box: a full-width header (title/toolbar/
  // input) on top, then a body split into results | preview below. Otherwise
  // it's the compact VSCode-style command palette over the list rect.
  const hasPreview = !!(p.previewRect && p.previewCells && list);
  let outer = p.outerRect || list;
  if(hasPreview){ outer = {x:list.x, y:list.y, w:(p.previewRect.x+p.previewRect.w)-list.x, h:list.h}; }
  const el=div("palette"+(hasPreview?" with-preview":""));
  // Position the card on the outer rect, with the input bar stacked above it so
  // it reads as one palette. (Clicks use the list cell rect below.)
  const inputH=34, w=outer?Math.max(360,px(outer.w,CW)):420;
  const left = outer?px(outer.x,CW):(window.innerWidth-w)/2;
  const top  = outer?Math.max(4, px(outer.y,CH)-inputH):80;
  el.style.left=left+"px"; el.style.top=top+"px"; el.style.width=w+"px";

  if(p.title){ const t=div("ptitle"); t.textContent=p.title; el.appendChild(t); }
  // plugin-built toolbar (real WidgetSpec widgets, e.g. live-grep scope toggles)
  if(p.toolbar){ const tb=div("ptoolbar"); tb.appendChild(widgetEl(p.toolbar, {kind:"toolbar", focusKey:p.toolbarFocus})); el.appendChild(tb); }
  // input bar (query + status + count)
  const bar=div("pinput");
  const q=document.createElement("span"); q.className="q";
  q.innerHTML=esc(p.query||"")+'<span class="caret2">&nbsp;</span>';
  bar.appendChild(q);
  if(p.status){ const st=document.createElement("span"); st.className="status"; st.textContent=p.status; bar.appendChild(st); }
  const cnt=document.createElement("span"); cnt.className="count";
  cnt.textContent=(p.total!=null)?((p.selected!=null?p.selected+1:0)+" / "+p.total):"";
  bar.appendChild(cnt);
  el.appendChild(bar);

  const listBox=paletteListEl(p, list);
  if(hasPreview){
    // body: results (left, list-rect width) | preview cells (right, framed)
    const body=div("pbody");
    listBox.style.flex="0 0 "+px(list.w,CW)+"px";
    const h=px(p.previewRect.h,CH)+"px"; listBox.style.maxHeight=h;
    const pv=div("ppreview"); pv.style.flex="1"; pv.style.height=h;
    pv.innerHTML=cellsSvg(p.previewCells, p.previewRect.w);
    body.appendChild(listBox); body.appendChild(pv);
    el.appendChild(body);
  } else {
    el.appendChild(listBox);
  }
  return el;
}

// ---- native status bar --------------------------------------------------
function statusBarEl(sb){
  const bar=div("region statusbar"); place(bar,sb.rect);
  const segEl=seg=>{
    const s=document.createElement("span"); s.className=(seg.name==="text"?"txt":"seg"); s.dataset.name=seg.name; s.textContent=seg.text;
    const c=rectCell({x:seg.x,y:sb.rect.y,w:seg.w,h:1});
    s.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:c.col,row:c.row}); };
    return s;
  };
  const segs=sb.segments.filter(s=>s.text);
  for(const seg of segs.filter(s=>s.side!=="right")) bar.appendChild(segEl(seg));
  const spacer=document.createElement("span"); spacer.style.flex="1"; bar.appendChild(spacer);
  for(const seg of segs.filter(s=>s.side==="right")) bar.appendChild(segEl(seg));
  return bar;
}

// ---- native popups (completion / hover / action / list / text) ----------
// The editor owns content, selection and scroll; we render natively and forward
// row clicks / wheel back through handle_mouse at the popup's content cells, so
// the existing popup hit-tester resolves them (no re-implemented logic).
function popupEl(p){
  const el=div("popup"); place(el,p.rect);
  if(p.title){ const t=div("popup-title"); t.textContent=p.title; el.appendChild(t); }
  if(p.description){ const d=div("popup-desc"); d.textContent=p.description; el.appendChild(d); }
  const body=div("popup-body");
  const cr=p.contentRect, n=Math.max(0,cr.h), start=p.scrollOffset||0;
  if(p.content.type==="list"){
    const items=p.content.items||[];
    for(let j=0;j<n;j++){
      const idx=start+j, it=items[idx]; if(!it) break;
      const row=div("popup-row"+(idx===p.content.selected?" sel":"")+(it.disabled?" disabled":""));
      if(it.icon){ const ic=document.createElement("span"); ic.className="picon"; ic.textContent=it.icon; row.appendChild(ic); }
      const tx=document.createElement("span"); tx.className="ptext2"; tx.textContent=it.text; row.appendChild(tx);
      if(it.detail){ const dt=document.createElement("span"); dt.className="pdetail"; dt.textContent=it.detail; row.appendChild(dt); }
      const cell={col:cr.x+1,row:cr.y+j};
      row.onmousedown=e=>{ if(it.disabled) return; e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:cell.col,row:cell.row}); };
      body.appendChild(row);
    }
  } else {
    const lines=p.content.lines||[];
    for(let j=0;j<n;j++){ const ln=lines[start+j]; if(ln===undefined) break; const d=div("popup-line"); d.textContent=ln; body.appendChild(d); }
  }
  el.appendChild(body);
  el.addEventListener("wheel",e=>{ e.stopPropagation(); sendMouse({kind:e.deltaY>0?"scrolldown":"scrollup",col:cr.x+1,row:cr.y,n:Math.min(5,Math.max(1,Math.round(Math.abs(e.deltaY)/40)))}); },{passive:true});
  return el;
}

// ---- native plugin widgets (WidgetSpec tree) ----------------------------
// Renders the serialized WidgetSpec natively (Row/Col→flex, Toggle/Button→
// native controls, …). Toggle/Button clicks route back to the owning plugin
// via the same event the TUI fires; `surface` selects the routing path.
// Concatenate a TextPropertyEntry's display text (segments preferred).
function entryText(e){ return (e.segments&&e.segments.length)?e.segments.map(s=>s.text||"").join(""):(e.text||""); }

// Route a widget interaction. `ctx.kind` is "toolbar" (prompt toolbar, routed by
// key) or "panel" (floating/dock, routed by matching a recorded hit → its index).
function routeWidget(ctx, node, listIndex){
  if(ctx.kind==="toolbar"){ if(node.key) sendWidget({surface:"toolbar",key:node.key}); return; }
  // panel: find the matching hit and send its index
  let hit=null;
  if(listIndex!=null){ hit=(ctx.hits||[]).find(h=>h.widgetKind==="list" && h.payload && h.payload.index===listIndex); }
  else if(node.key){ hit=(ctx.hits||[]).find(h=>h.widgetKey===node.key); }
  if(hit) sendWidget({surface:"panel",plugin:ctx.plugin,panelId:ctx.panelId,hitIndex:hit.index});
}

function widgetEl(spec, ctx){
  if(!spec) return document.createTextNode("");
  const kind=spec.kind, fk=ctx.focusKey;
  const focused = spec.key && spec.key===fk;
  if(kind==="row"||kind==="col"){
    const el=div("w-"+kind+(spec.wrap?" wrap":""));
    for(const c of (spec.children||[])) el.appendChild(widgetEl(c, ctx));
    return el;
  }
  if(kind==="toggle"){
    const el=div("w-toggle"+(spec.checked?" on":"")+(focused?" focus":""));
    const box=document.createElement("span"); box.className="w-box"; box.textContent=spec.checked?"☑":"☐"; el.appendChild(box);
    const lb=document.createElement("span"); lb.className="w-label"; lb.textContent=spec.label||""; el.appendChild(lb);
    if(spec.key) el.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); routeWidget(ctx,spec); };
    return el;
  }
  if(kind==="button"){
    const el=div("w-button "+(spec.intent||"normal")+(spec.disabled?" disabled":"")+(focused?" focus":""));
    el.textContent=spec.label||"";
    if(spec.key && !spec.disabled) el.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); routeWidget(ctx,spec); };
    return el;
  }
  if(kind==="spacer"){ const el=div("w-spacer"); if(spec.flex) el.style.flex="1"; else el.style.width=((spec.cols||1)*CW)+"px"; return el; }
  if(kind==="divider"){ return div("w-divider"); }
  if(kind==="hintBar"){
    const el=div("w-hintbar");
    for(const h of (spec.entries||[])){ const e2=document.createElement("span"); e2.className="w-hint";
      e2.innerHTML='<b>'+esc(h.keys||"")+'</b> '+esc(h.label||""); el.appendChild(e2); }
    return el;
  }
  if(kind==="labeledSection"){
    const el=div("w-section"); if(spec.label){ const l=div("w-section-label"); l.textContent=spec.label; el.appendChild(l); }
    if(spec.child) el.appendChild(widgetEl(spec.child, ctx)); return el;
  }
  if(kind==="text"){
    const el=div("w-text"+(focused?" focus":""));
    if(spec.label){ const l=document.createElement("span"); l.className="w-text-label"; l.textContent=spec.label+": "; el.appendChild(l); }
    const v=document.createElement("span"); v.className="w-text-val"; v.textContent=spec.value||spec.placeholder||""; el.appendChild(v);
    if(spec.key) el.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); routeWidget(ctx,spec); };
    return el;
  }
  if(kind==="list"){
    const el=div("w-list");
    const inst=(ctx.instances&&spec.key)?ctx.instances[spec.key]:null;
    const sel=inst?inst.selectedIndex:(spec.selectedIndex!=null?spec.selectedIndex:-1);
    const specs=spec.itemSpecs||[];
    if(specs.length){
      // Card list: each logical item is a WidgetSpec (e.g. a LabeledSection
      // "card"); the whole card is one select hit. Overrides `items`.
      el.classList.add("w-list-cards");
      specs.forEach((s,i)=>{
        const card=div("w-list-card"+(i===sel?" sel":""));
        card.appendChild(widgetEl(s, ctx));
        card.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); routeWidget(ctx,spec,i); };
        el.appendChild(card);
      });
    } else {
      (spec.items||[]).forEach((it,i)=>{
        const row=div("w-list-row"+(i===sel?" sel":""));
        row.textContent=entryText(it);
        row.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); routeWidget(ctx,spec,i); };
        el.appendChild(row);
      });
      if(!(spec.items||[]).length){ const empty=div("w-list-empty"); empty.textContent="(empty)"; el.appendChild(empty); }
    }
    return el;
  }
  if(kind==="raw"&&spec.entries){ const el=div("w-raw"); el.textContent=spec.entries.map(entryText).join("\n"); return el; }
  const fb=div("w-unsupported"); fb.textContent="["+kind+"]"; return fb;
}

// Native Settings — a control's value rendered semantically (read from the
// shared model; keyboard drives edits via handle_key).
const SET_LIST_KINDS = new Set(["textList","map","objectArray","dualList"]);
// Inline control (toggle/number/dropdown/text/json/complex). `idx` = item index;
// `live` enables click routing (false inside the entry dialog, which is keyboard).
function settingControlEl(c, idx, live){
  const k=c.kind, el=document.createElement("span"); el.className="set-ctl set-"+k;
  if(k==="toggle"){ const sw=document.createElement("span"); sw.className="set-switch"+(c.checked?" on":""); el.appendChild(sw); if(live) sw.onmousedown=setHit("controlToggle",idx); }
  else if(k==="number"){
    const mk=(t,cls,hit)=>{const b=document.createElement("span");b.className=cls;b.textContent=t;if(live&&hit)b.onmousedown=setHit(hit,idx);return b;};
    el.appendChild(mk("−","set-step","controlDecrement")); const v=document.createElement("span"); v.className="set-num-v"; v.textContent=c.value; el.appendChild(v); el.appendChild(mk("+","set-step","controlIncrement"));
  }
  else if(k==="dropdown"){ const p=document.createElement("span"); p.className="set-pill"; p.textContent=(c.options[c.selected]||"—")+" ▾"; if(live) p.onmousedown=setHit("controlDropdown",idx); el.appendChild(p);
    if(c.open){ const d=div("set-dd"); c.options.forEach((o,i)=>{const r=div("set-dd-row"+(i===c.selected?" sel":""));r.textContent=o;if(live)r.onmousedown=setHit("controlDropdownOption",idx,i);d.appendChild(r);}); el.appendChild(d);} }
  else if(k==="text"){ const f=document.createElement("span"); f.className="set-field"; f.textContent=(c.value||c.placeholder||"")+(c.editing?"▌":""); if(live) f.onmousedown=setHit("controlText",idx); el.appendChild(f); }
  else if(k==="json"){ const f=document.createElement("span"); f.className="set-field mono"; f.textContent=(c.value||"").slice(0,80)||"{}"; if(live) f.onmousedown=setHit("controlText",idx); el.appendChild(f); }
  else if(k==="complex"){ el.textContent="‹"+c.typeName+"›"; el.classList.add("set-dim"); }
  return el;
}
// Full-width list block for composite controls (rows + an Add affordance).
function settingListEl(c, idx, live){
  const k=c.kind;
  // DualList has its own two-column layout (Available | Included) plus the
  // add/remove/move buttons; render it natively and route each click to the
  // matching SettingsHit (same dispatch the TUI uses).
  if(k==="dualList") return dualListEl(c, idx, live);
  const el=div("set-list"); let rows=[];
  // rowHit: (rowIndex) -> SettingsHit for clicking that row; addHit for "＋ Add".
  let rowHit=null, addHit=null;
  if(k==="textList"){ rows=c.items.map(t=>({label:t})); rowHit=i=>["controlTextListRow",idx,i]; addHit=["controlTextListRow",idx,c.items.length]; }
  else if(k==="map"){ rows=c.entries.map(e=>({label:e.key, sub:e.display})); rowHit=i=>["controlMapRow",idx,i]; addHit=["controlMapAddNew",idx]; }
  else if(k==="objectArray"){ rows=c.entries.map(t=>({label:t})); rowHit=i=>["controlMapRow",idx,i]; }   // select item; Enter edits
  if(!rows.length){ const e=div("set-list-empty"); e.textContent="No entries"; el.appendChild(e); }
  rows.forEach((r,i)=>{ const row=div("set-list-row");
    if(r.badge){ const b=document.createElement("span"); b.className="set-list-badge"; b.textContent=r.badge; row.appendChild(b); }
    const l=document.createElement("span"); l.className="set-list-label"; l.textContent=r.label; row.appendChild(l);
    if(r.sub){ const s=document.createElement("span"); s.className="set-list-sub"; s.textContent=r.sub; row.appendChild(s); }
    if(live&&rowHit){ const h=rowHit(i); row.onmousedown=setHit(h[0],h[1],h[2]); }
    el.appendChild(row); });
  const add=div("set-list-add"); add.textContent="＋ Add…"; if(live&&addHit) add.onmousedown=setHit(addHit[0],addHit[1],addHit[2]); el.appendChild(add);
  return el;
}
// Two-column dual list (Available ⇄ Included) with native add/remove/move
// buttons. `idx` is the settings item index; row indices line up with the
// scene's `available`/`included` arrays (which mirror the control's own
// enumerations), so the dispatch hits select the right entry.
function dualListEl(c, idx, live){
  const el=div("set-dual");
  const col=(title, items, activeWhen, cursor, hitKind)=>{
    const cl=div("set-dual-col"+(c.activeColumn===activeWhen?" active":""));
    const h=div("set-dual-coltitle"); h.textContent=title; cl.appendChild(h);
    const list=div("set-dual-list");
    if(!items.length){ const e=div("set-list-empty"); e.textContent="—"; list.appendChild(e); }
    items.forEach((t,i)=>{ const r=div("set-dual-row"+(c.activeColumn===activeWhen&&i===cursor?" sel":""));
      r.textContent=t; if(live) r.onmousedown=setHit(hitKind,idx,i); list.appendChild(r); });
    cl.appendChild(list); return cl;
  };
  el.appendChild(col("Available", c.available, "available", c.availableCursor, "controlDualListAvailable"));
  // middle: add/remove + reorder buttons
  const mid=div("set-dual-mid");
  const mkb=(t,hit,title)=>{ const b=div("set-dual-btn"); b.textContent=t; b.title=title; if(live) b.onmousedown=setHit(hit,idx); return b; };
  mid.appendChild(mkb("→","controlDualListAdd","Add to included"));
  mid.appendChild(mkb("←","controlDualListRemove","Remove from included"));
  mid.appendChild(mkb("↑","controlDualListMoveUp","Move up"));
  mid.appendChild(mkb("↓","controlDualListMoveDown","Move down"));
  el.appendChild(mid);
  el.appendChild(col("Included", c.included, "included", c.includedCursor, "controlDualListIncluded"));
  return el;
}
// `entry` flag: rows belong to the add/edit sub-dialog, whose interaction is
// "select the item then keyboard-edit it". A row click routes to the entry
// dialog's own dispatch (kind "entryItem") and inner controls are display-only
// (live=false), matching the TUI's entry-dialog click behavior.
function settingItemRows(items, container, live, entry){
  for(const it of items){
    if(it.sectionStart && it.section){ const h=div("set-section"); h.textContent=it.section; container.appendChild(h); }
    const isList=SET_LIST_KINDS.has(it.control.kind);
    const row=div("set-item"+(it.selected?" sel":"")+(it.readOnly?" ro":"")+(isList?" set-item-block":""));
    const head=div("set-item-head");
    const nm=div("set-name"); nm.textContent=it.name+(it.modified?" •":""); head.appendChild(nm);
    const selectHit = entry
      ? (it.readOnly ? null : e=>{ e.preventDefault(); e.stopPropagation(); sendSettings({kind:"entryItem", a:it.index}); })
      : (live ? setHit("item",it.index) : null);  // click the row label = select item
    if(selectHit){ nm.onmousedown=selectHit; }
    if(!isList){ const ctl=div("set-ctl-wrap"); ctl.appendChild(settingControlEl(it.control,it.index,live&&!entry)); head.appendChild(ctl); if(entry&&selectHit) ctl.onmousedown=selectHit; }
    row.appendChild(head);
    if(it.description){ const d=div("set-desc"); d.textContent=it.description; row.appendChild(d); }
    if(isList) row.appendChild(settingListEl(it.control,it.index,live&&!entry));
    container.appendChild(row);
  }
}
function settingsEls(s){

  const el=div("region settings-modal");
  const title=div("set-title"); title.textContent=s.title+"  —  layer: "+s.targetLayer; el.appendChild(title);
  const body=div("set-body");
  // left: category tree
  const cats=div("set-cats"+(s.focus==="categories"?" focus":""));
  for(const c of s.categories){ const r=div("set-cat"+(c.selected?" sel":""));
    if(c.expandable){ const chev=document.createElement("span"); chev.className="set-cat-chev"; chev.textContent=c.expanded?"▼ ":"▶ "; chev.onmousedown=setHit("categoryDisclosure",c.index); r.appendChild(chev); } else r.appendChild(document.createTextNode("  "));
    const nm=document.createElement("span"); nm.textContent=c.name; r.appendChild(nm);
    r.onmousedown=setHit("category",c.index); cats.appendChild(r);
    if(c.expanded){ c.sections.forEach((sec,si)=>{ const sr=div("set-cat-sec"); sr.textContent="   "+sec; sr.onmousedown=setHit("categorySection",c.index,si); cats.appendChild(sr); }); } }
  body.appendChild(cats);

    s.searchResults.forEach((r,i)=>{const rr=div("set-sresult"+(i===s.searchSelected?" sel":""));rr.textContent=r.name+"   — "+r.category;rr.onmousedown=setHit("searchResult",i);right.appendChild(rr);}); }
  else { settingItemRows(s.items, right, true); }
  body.appendChild(right);
  el.appendChild(body);
  // footer
  const ft=div("set-footer"); const fkinds=["layer","reset","save","cancel"];
  s.footerButtons.forEach((b,i)=>{
    const sel=i===s.footerSelected&&s.focus==="footer";
    const bb=div("btn"+(b==="Save"?" primary":"")+(sel?" sel":"")); bb.textContent=b; bb.onmousedown=setHit(fkinds[i]||"cancel"); ft.appendChild(bb);
  }); el.appendChild(ft);
  // entry dialog (Map/ObjectArray add/edit): rows are clickable (select+edit),
  // controls keyboard-driven, buttons routed by name to the entry dispatch.
  if(s.entryDialog){ const d=s.entryDialog; const dlg=div("set-overlay set-entry");
    const dt=div("set-entry-title"); dt.textContent=d.title; dlg.appendChild(dt);
    const di=div("set-entry-items"); settingItemRows(d.items.map((it,i)=>({...it,selected:i===d.selectedItem&&!d.focusOnButtons})), di, true, true); dlg.appendChild(di);
    const db=div("set-dlg-btns");
    // Button focus index follows the TUI order [Save, Cancel, Delete]; the
    // visual order here puts Delete in the middle but each routes by name.
    const tuiIdx={Save:0,Cancel:1,Delete:2};
    const btns=d.noDelete?["Save","Cancel"]:["Save","Delete","Cancel"];
    btns.forEach(b=>{const f=d.focusOnButtons&&tuiIdx[b]===d.focusedButton; const bb=div("btn"+(b==="Save"?" primary":b==="Delete"?" danger":"")+(f?" sel":"")); bb.textContent=b;
      bb.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendSettings({kind:"entryButton", button:b.toLowerCase()}); }; db.appendChild(bb);}); dlg.appendChild(db);
    el.appendChild(dlg); }
  if(s.showingHelp){ const h=div("set-overlay"); h.innerHTML="<b>Settings help</b><br>↑↓ navigate · Tab switch panel · Space/Enter activate · Ctrl+S save · Esc close"; el.appendChild(h); }
  out.push(el);
  return out;
}

// Native keybinding editor — full modal (header/search/filters, table, footer,
// help, add/edit dialog, confirm). Keyboard-driven: keystrokes are forwarded
// globally to handle_key, which the editor's own dispatch handles. The scrim
// swallows stray clicks so nothing mis-routes.
function keybindingEditorEls(kb){
  const out=[];
  const scrim=div("modal-scrim"); scrim.onmousedown=e=>e.stopPropagation(); out.push(scrim);

    const sb=div("kb-search"+(kb.search.focused?" focus":""));

    const val=document.createElement("span");
    val.textContent=kb.search.mode==="recordKey"?(kb.search.keyDisplay||"Press a key…"):(kb.search.query+(kb.search.focused?"▌":""));

  }
  const flt=div("kb-filters");
  const cf=document.createElement("span"); cf.className="kb-chip"+(kb.contextFiltered?" on":""); cf.textContent="Context: "+kb.contextFilter; flt.appendChild(cf);
  const sf=document.createElement("span"); sf.className="kb-chip"+(kb.sourceFiltered?" on":""); sf.textContent="Source: "+kb.sourceFilter; flt.appendChild(sf);
  const cnt=document.createElement("span"); cnt.className="kb-count"; cnt.textContent=kb.count+" bindings"+(kb.hasChanges?"  • modified":""); flt.appendChild(cnt);
  hdr.appendChild(flt);
  el.appendChild(hdr);

  // table
  const tbl=div("kb-table");
  const head=div("kb-row kb-head"); for(const c of ["Key","Action","Description","Context","Source"]){ const s=document.createElement("span"); s.className="kb-col kb-"+c.toLowerCase(); s.textContent=c; head.appendChild(s); } tbl.appendChild(head);
  const start=kb.scrollOffset||0, n=kb.viewport||kb.rows.length;
  const kbHit=i=>e=>{ e.preventDefault(); e.stopPropagation(); sendKbedit({a:i}); };
  for(let j=0;j<n;j++){ const idx=start+j, r=kb.rows[idx]; if(!r) break;
    if(r.type==="section"){ const row=div("kb-row kb-section"+(r.selected?" sel":"")); row.textContent=(r.collapsed?"▶ ":"▼ ")+r.name+" ("+r.count+")"; row.onmousedown=kbHit(idx); tbl.appendChild(row); continue; }
    const row=div("kb-row"+(r.selected?" sel":""));

    for(const [cls,txt] of cols){ const s=document.createElement("span"); s.className="kb-col kb-"+cls; s.textContent=txt||""; row.appendChild(s); }
    row.onmousedown=kbHit(idx);

  el.appendChild(ft);

  // help overlay
  if(kb.showingHelp){
    const h=div("kb-overlay kb-help");
    h.innerHTML="<b>Keybinding editor</b><br>↑↓ navigate · Enter edit · a add · d delete<br>/ search · r record-key · Tab toggle mode<br>c context filter · s source filter<br>Ctrl+S save · Esc close · ? toggle help";
    el.appendChild(h);
  }

  // edit / add dialog
  if(kb.editDialog){
    const d=kb.editDialog; const dlg=div("kb-overlay kb-dialog");
    const dt=div("kb-dlg-title"); dt.textContent=d.title; dlg.appendChild(dt);
    const fld=(label,val,focused,extra)=>{ const f=div("kb-field"+(focused?" focus":"")); const l=document.createElement("span"); l.className="kb-field-l"; l.textContent=label; f.appendChild(l);
      const v=document.createElement("span"); v.className="kb-field-v"; v.textContent=val; f.appendChild(v); if(extra){ const e2=document.createElement("span"); e2.className="kb-field-x"; e2.textContent=extra; f.appendChild(e2);} return f; };
    dlg.appendChild(fld("Key:", d.keyDisplay||(d.keyCapturing?"Press a key…":"(none)"), d.focusArea===0, d.keyCapturing?"(capturing)":""));
    const af=fld("Action:", d.actionText+(d.focusArea===1?"▌":""), d.focusArea===1, "");
    if(d.actionError){ const e2=document.createElement("span"); e2.className="kb-err"; e2.textContent="✗ "+d.actionError; af.appendChild(e2); }
    dlg.appendChild(af);
    if(d.autocomplete && d.autocomplete.length){ const ac=div("kb-autocomplete");
      d.autocomplete.forEach((s,i)=>{ const r=div("kb-ac-row"+(i===d.autocompleteSelected?" sel":"")); r.textContent=s; ac.appendChild(r); }); dlg.appendChild(ac); }
    dlg.appendChild(fld("Context:", "["+d.context+"]", d.focusArea===2, d.focusArea===2?"(← → cycle)":""));
    if(d.conflicts && d.conflicts.length){ const cf2=div("kb-conflicts"); cf2.innerHTML="<b>Conflicts:</b>"; for(const c of d.conflicts){ const r=document.createElement("div"); r.textContent="  "+c; cf2.appendChild(r);} dlg.appendChild(cf2); }
    const btns=div("kb-dlg-btns");
    const sb=div("kb-btn"+(d.saveFocused?" focus":"")); sb.textContent="[ Save ]"; btns.appendChild(sb);
    const cb=div("kb-btn"+(d.cancelFocused?" focus":"")); cb.textContent="[ Cancel ]"; btns.appendChild(cb);
    dlg.appendChild(btns);
    el.appendChild(dlg);
  }

  // confirm dialog
  if(kb.confirm){ const c=div("kb-overlay kb-confirm");
    const m=div("kb-confirm-msg"); m.textContent="Save changes before closing?"; c.appendChild(m);
    const b=div("kb-dlg-btns"); kb.confirm.buttons.forEach((label,i)=>{ const bb=div("kb-btn"+(i===kb.confirm.selected?" focus":"")); bb.textContent="[ "+label+" ]"; b.appendChild(bb); }); c.appendChild(b);
    el.appendChild(c);
  }

  out.push(el);
  return out;
}

// Native auxiliary modals (keybinding editor / event-debug / theme-info). A
// titled list of lines; anchored (theme-info) or centered. Interaction (nav /
// Esc / rebind) already flows through handle_key, so this is render-only.
function auxModalEls(m){
  const out=[];
  const anchored = m.rect && (m.rect.x || m.rect.y);
  if(!anchored){ const scrim=div("modal-scrim"); scrim.onmousedown=e=>e.stopPropagation(); out.push(scrim); }
  const el=div("region auxmodal "+(anchored?"anchored":"centered")+" am-"+m.kind);
  if(anchored){ el.style.left=px(m.rect.x,CW)+"px"; el.style.top=px(m.rect.y,CH)+"px"; }
  const title=div("am-title"); title.textContent=m.title; el.appendChild(title);
  const body=div("am-body");
  for(const ln of m.lines){ const r=div("am-line"+(ln.selected?" sel":"")); r.textContent=ln.text||" "; body.appendChild(r); }
  el.appendChild(body);
  if(m.footer){ const f=div("am-footer"); f.textContent=m.footer; el.appendChild(f); }
  out.push(el);
  return out;
}

// Native right-click / new-tab context menu. Rendered at the menu's cell
// position; clicking item i forwards a click at (x+1, y+1+i) — the cell the
// editor's hit-test resolves to that item (`item_idx = row - y - 1`).
function contextMenuEl(cm){
  const el=div("region ctxmenu");
  el.style.left=px(cm.x,CW)+"px"; el.style.top=px(cm.y,CH)+"px";
  cm.items.forEach((label,i)=>{
    const row=div("ctxitem"+(i===cm.highlighted?" sel":""));
    row.textContent=label;
    const cell={col:cm.x+1,row:cm.y+1+i};
    row.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:cell.col,row:cell.row}); };
    row.onmouseenter=()=>sendMouse({kind:"moved",col:cell.col,row:cell.row});
    el.appendChild(row);
  });
  return el;
}

// A floating / dock plugin widget panel, rendered natively at its cell rect.
function widgetSurfaceEl(s){
  const el=div("region widget-surface w-"+s.kind); place(el,s.rect);
  const ctx={ kind:"panel", plugin:s.plugin, panelId:s.panelId, hits:s.hits, instances:s.instances, focusKey:s.focusKey };
  el.appendChild(widgetEl(s.spec, ctx));
  // A left dock's rightmost column is an editor resize border (dock_resizing);
  // give it an explicit grip since the .widget-surface is in onChrome.
  if(s.kind==="dock") el.appendChild(borderDragHandle(s.rect.x + s.rect.w - 1, s.rect.y, s.rect.h));
  return el;
}

// ---- native workspace-trust dialog --------------------------------------
// Blocking modal. Options / OK / Quit forward to handle_mouse at the pipeline's
// recorded cell rects (the existing handle_workspace_trust_mouse resolves them);
// keyboard already works through handle_key.
function trustDialogEls(t){
  const out=[];
  const scrim=div("modal-scrim"); scrim.onmousedown=e=>e.stopPropagation(); out.push(scrim);
  const el=div("trustdialog"); place(el,t.dialog);
  const title=div("td-title"); title.textContent="⚠  "+t.title; el.appendChild(title);
  if(t.path){ const p=div("td-path"); p.textContent=t.path; el.appendChild(p); }
  if(t.triggers){ const g=div("td-triggers"); g.textContent="Detected: "+t.triggers; el.appendChild(g); }
  for(const o of t.options){
    const row=div("td-opt"+(o.selected?" sel":""));
    const rad=document.createElement("span"); rad.className="td-radio"; rad.textContent=o.selected?"◉":"○"; row.appendChild(rad);
    const tx=document.createElement("div"); tx.className="td-otext";
    tx.innerHTML='<div class="td-olabel">'+esc(o.label)+'</div><div class="td-odesc">'+esc(o.description)+'</div>';
    row.appendChild(tx);
    const c=rectCell(o.rect);
    row.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:c.col,row:c.row}); };
    el.appendChild(row);
  }
  const btns=div("td-buttons");
  const mk=(label,rect,primary)=>{ const b=div("td-btn"+(primary?" primary":"")); b.textContent=label; const c=rectCell(rect);
    b.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:c.col,row:c.row}); }; return b; };
  btns.appendChild(mk(t.okLabel, t.ok, true));
  btns.appendChild(mk(t.quitLabel, t.quit, false));
  el.appendChild(btns);
  out.push(el);
  return out;
}

// ---- native file explorer (sidebar tree) --------------------------------
// The editor owns the tree (expand/collapse/selection/scroll); we render the
// visible window natively and forward row clicks / wheel to handle_mouse at the
// sidebar's content cells, which the existing file-explorer hit-test resolves.
function fileExplorerEl(fe){
  const el=div("region fileexplorer"); place(el,fe.rect);
  const title=div("fx-title"); title.textContent=fe.title||"Explorer"; el.appendChild(title);
  const list=div("fx-list");
  const n=Math.max(0,(fe.viewportHeight||fe.rect.h)), start=fe.scrollOffset||0;
  for(let j=0;j<n;j++){
    const idx=start+j, r=fe.rows[idx]; if(!r) break;
    const row=div("fx-row"+(idx===fe.selected?" sel":""));
    row.style.paddingLeft=(6 + r.depth*10)+"px";
    const chev=document.createElement("span"); chev.className="fx-chev";
    chev.textContent=r.isDir?(r.expanded?"▾":"▸"):"";
    row.appendChild(chev);
    const name=document.createElement("span"); name.className="fx-name"+(r.isDir?" dir":""); name.textContent=r.name;
    row.appendChild(name);
    const cell={col:fe.rect.x+1,row:fe.rect.y+1+j};   // +1 for the title row
    // Forward the real button so a right-click opens the explorer context menu.
    row.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:btn(e),col:cell.col,row:cell.row}); };
    list.appendChild(row);
  }
  el.appendChild(list);
  el.addEventListener("wheel",e=>{ e.stopPropagation(); sendMouse({kind:e.deltaY>0?"scrolldown":"scrollup",col:fe.rect.x+1,row:fe.rect.y+1,n:Math.min(5,Math.max(1,Math.round(Math.abs(e.deltaY)/40)))}); },{passive:true});
  // Right-edge resize handle: the editor treats the explorer's rightmost column
  // as a drag border (handle_file_explorer_border_drag). The .fileexplorer div
  // is in onChrome, so the document drag won't fire here — wire it explicitly.
  el.appendChild(borderDragHandle(fe.rect.x + fe.rect.w - 1, fe.rect.y, fe.rect.h));
  return el;
}

// A 1-cell-wide vertical resize grip at editor column `bx`. Drives a real
// editor drag: mousedown sends a `down` at that cell, pointer moves send
// `drag` at the current column (same row), release sends `up` — exactly what
// the TUI does for the file-explorer / dock borders. Uses window listeners so
// the drag continues even when the pointer leaves the chrome element.
function borderDragHandle(bx, by, h){
  const grip=div("resize-grip");
  grip.style.left=px(bx,CW)+"px"; grip.style.top=px(by,CH)+"px";
  grip.style.width=px(1,CW)+"px"; grip.style.height=px(h,CH)+"px";
  grip.onmousedown=e=>{
    e.preventDefault(); e.stopPropagation();
    sendMouse({kind:"down",button:"left",col:bx,row:by});
    const move=ev=>{ const col=Math.max(0,Math.floor(ev.clientX/CW));
      sendMouse({kind:"drag",button:"left",col,row:by}); };
    const up=ev=>{ const col=Math.max(0,Math.floor(ev.clientX/CW));
      sendMouse({kind:"up",button:"left",col,row:by});
      window.removeEventListener("mousemove",move); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
  };
  return grip;
}

// --- bridge to the real editor ---
// Apply a scene from any endpoint, re-rendering only when it actually changed
// so the idle poll loop doesn't churn the DOM (or restart the caret blink).
let sceneStr=null;
function applyScene(s){ const str=JSON.stringify(s); if(str===sceneStr) return; sceneStr=str; scene=s; render(); }
async function refresh(){ try{ applyScene(await (await fetch("/state")).json()); }catch(e){ showErr("load failed: "+e); } }
async function sendKey(d){ try{ applyScene(await (await fetch("/key",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(d)})).json()); }catch(e){ showErr("key failed: "+e); } }
async function resize(){ const cols=Math.max(20,Math.floor(window.innerWidth/CW)), rows=Math.max(8,Math.floor(window.innerHeight/CH));
  try{ applyScene(await (await fetch("/resize",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({cols,rows})})).json()); }catch(e){} }
function showErr(m){ const e=document.getElementById("err"); e.textContent=m; e.style.display="block"; }

// Poll loop: each GET /state ticks the real editor (drains async LSP/plugin/file
// events, steps animations) just like the TUI's 60fps loop, so frames advance
// without user input. Poll fast while something is animating / pending, slowly
// when idle (just to pick up async events). setTimeout (not setInterval) so polls
// never overlap.
async function poll(){
  await refresh();
  const active = scene && scene.regions && scene.regions.poll && scene.regions.poll.active;
  setTimeout(poll, active ? 40 : 500);
}

const NAMED=new Set(["Enter","Backspace","Delete","Tab","Escape","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Home","End","PageUp","PageDown"]);
document.addEventListener("keydown",e=>{
  // forward single characters (with or without modifiers, so Ctrl+P / Ctrl+S
  // shortcuts reach the editor) and the named navigation/edit keys.
  const single=e.key.length===1;
  if(single||NAMED.has(e.key)){ e.preventDefault(); sendKey({key:e.key,ctrl:e.ctrlKey,meta:e.metaKey,shift:e.shiftKey,alt:e.altKey}); }
});
// Mouse + wheel: forward to the REAL Editor::handle_mouse at cell coordinates.
const cellAt = e => ({ col: Math.max(0, Math.floor(e.clientX/CW)), row: Math.max(0, Math.floor(e.clientY/CH)) });
const btn = e => (e.button===2?"right":e.button===1?"middle":"left");
async function sendMouse(o){ try{ applyScene(await (await fetch("/mouse",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(o)})).json()); }catch(err){ showErr("mouse failed: "+err); } }
async function sendWidget(o){ try{ applyScene(await (await fetch("/widget",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(o)})).json()); }catch(err){ showErr("widget failed: "+err); } }
async function sendSettings(o){ try{ applyScene(await (await fetch("/settings",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(o)})).json()); }catch(err){ showErr("settings failed: "+err); } }
async function sendKbedit(o){ try{ applyScene(await (await fetch("/kbedit",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(o)})).json()); }catch(err){ showErr("kbedit failed: "+err); } }
// click handler that forwards a SettingsHit (kind + indices) to the editor
function setHit(kind,a,b){ return e=>{ e.preventDefault(); e.stopPropagation(); sendSettings({kind,a,b}); }; }
// Forward a hover as a `moved` event at a chrome element's *editor cell* (not the
// pixel under the pointer — native chrome is laid out by CSS, so pixels don't map
// to the editor's cell columns). Called from `onmousemove` (which, unlike
// `mouseenter`, never fires on a DOM rebuild under a stationary cursor), and
// de-duped so keyboard navigation isn't fought and we don't spam the editor.
let lastHoverKey=null;
function hoverMove(col,row,key){ if(key===lastHoverKey) return; lastHoverKey=key; sendMouse({kind:"moved",col,row}); }
let dragging=false, lastCell=null;
// Chrome (menu bar, dropdown, tabs, status bar) owns its own mouse events and
// forwards them to the editor at the exact cell rects the pipeline reported.
// The document-level handlers are the fallback for buffer interiors, scrollbars
// and separators, so they ignore anything that lands on a chrome element.
const onChrome = e => e.target.closest(".menubar,.dropdown,.tabbar,.statusbar,.palette,.popup,.fileexplorer,.trustdialog,.modal-scrim,.widget-surface,.ctxmenu,.auxmodal,.kbedit,.settings-modal");
document.addEventListener("mousedown",e=>{ if(onChrome(e)) return; const c=cellAt(e); dragging=true; lastCell=c; sendMouse({kind:"down",button:btn(e),col:c.col,row:c.row,ctrl:e.ctrlKey,shift:e.shiftKey,alt:e.altKey}); });
document.addEventListener("mousemove",e=>{ if(!dragging) return; const c=cellAt(e); if(lastCell&&c.col===lastCell.col&&c.row===lastCell.row) return; lastCell=c; sendMouse({kind:"drag",button:"left",col:c.col,row:c.row,ctrl:e.ctrlKey,shift:e.shiftKey,alt:e.altKey}); });
document.addEventListener("mouseup",e=>{ dragging=false; if(onChrome(e)) return; const c=cellAt(e); sendMouse({kind:"up",button:btn(e),col:c.col,row:c.row}); });
document.addEventListener("contextmenu",e=>e.preventDefault());
// Settings panes and plugin dock/widget panels emit their full content into the
// DOM, so they scroll natively — forwarding their wheel to the editor would only
// trigger a re-render that resets scrollTop. Let the browser handle those; route
// everything else to the editor at the pointer cell.
const onScrollable = e => e.target.closest(".set-items,.set-cats,.w-list,.widget-surface");
document.addEventListener("wheel",e=>{ if(onScrollable(e)) return; const c=cellAt(e); const n=Math.min(8,Math.max(1,Math.round(Math.abs(e.deltaY)/40))); sendMouse({kind:e.deltaY>0?"scrolldown":"scrollup",col:c.col,row:c.row,n}); },{passive:true});

let rt; window.addEventListener("resize",()=>{ clearTimeout(rt); rt=setTimeout(resize,150); });

window.fresh = { get scene(){return scene;}, refresh, sendKey, resize };
resize().then(poll); // size to the window, render, then start the frame poll loop
</script>
</body>
</html>
